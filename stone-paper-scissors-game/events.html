<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>
    <style>
        div{
            height: 100px;
            width: 100px;
            border-color: black;
            border : 2px solid black;
            background-color: lightblue;
                
        }
    </style>
</head>
<body>
    <div>
        <p class="para1">Hello, World!</p>
    </div>
    <h1>Events</h1>
    <button id="btn">Click me!</button>
    <input type="text" id="btn1" placeholder="Type something...">
    <button id="dark-mode">Click to Change Theme</button>

    <script>
        let div = document.querySelector('div');
        div.addEventListener('mouseover', function() {
            document.querySelector('.para1').textContent= "nikal laude";
            document.querySelector('.para1').style.color = 'red';
        });
        div.addEventListener('mouseout', function() {
            document.querySelector('.para1').textContent= "Hello, World!";
            document.querySelector('.para1').style.color = 'black';
        });
        let currMode = 'light';
        let button = document.getElementById('btn');
        button.addEventListener('click', function() {
            alert('Button was clicked!');
        });
        let button1 = document.getElementById('btn1');
        button1.addEventListener('input', function(e) {
            console.log(e.target.value);
        });
        let darkModeButton = document.getElementById('dark-mode');
        darkModeButton.addEventListener('click', function() {
            if (currMode === 'light') {
                document.body.style.backgroundColor = 'black';
                document.body.style.color = 'white';
                currMode = 'dark';
            } else {
                document.body.style.backgroundColor = 'white';
                document.body.style.color = 'black';
                currMode = 'light';
            }
            console.log('Current mode:', currMode);
        });
    </script>
</body>
</html>
