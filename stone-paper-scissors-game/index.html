<!doctype html>
<html>

<head>
    <title>Stone Paper Scissors</title>

    <style>
        body {
            background-color: black;
            font-family: Tahoma, sans-serif;
        }

        h1 {
            color: white;
            font-size: 40px;
        }

        p {
            color: white;
            font-size: 20px;
            margin-bottom: 40px;
        }

        /* GAME BUTTONS */
        .game-button {
            background-color: transparent;
            border: 3px solid white;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            cursor: pointer;
            margin-right: 20px;
        }

        .game-icon {
            width: 100px;
            height: 100px;
        }

        /* RESET BUTTON */
        .reset-button {
            background-color: white;
            color: black;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 18px;
            cursor: pointer;
        }

        .reset-button:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>

<body>

    <h1>Stone Paper Scissors</h1>

    <p>Welcome to the game!</p>

    <p>Choose your move:</p>

    <button class="game-button" onclick="playGame('Stone')">
        <img src="images/rock-emoji.png" class="game-icon" alt="Stone">
    </button>

    <button class="game-button" onclick="playGame('Paper')">
        <img src="images/paper-emoji.png" class="game-icon" alt="Paper">
    </button>

    <button class="game-button" onclick="playGame('Scissors')">
        <img src="images/scissors-emoji.png" class="game-icon" alt="Scissors">
    </button>

    <p class="js-result"></p>
    <p class="js-moves"></p>
    <p class="js-score"></p>

    <button class="reset-button" onclick="
        score.wins = 0;
        score.losses = 0;
        score.tie = 0;

        localStorage.setItem('score', JSON.stringify(score));

        updateScore();
    ">
        Reset Score
    </button>

    <script>

        const score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0,
            tie: 0
        };

        updateScore();

        function playGame(PlayerMove) {

            const computerMove = pickComputerMove();

            let result;

            if (PlayerMove === computerMove) {
                result = "It's a tie!";
            }

            else if (
                (PlayerMove === 'Stone' && computerMove === 'Scissors') ||
                (PlayerMove === 'Paper' && computerMove === 'Stone') ||
                (PlayerMove === 'Scissors' && computerMove === 'Paper')
            ) {
                result = "You win!";
            }

            else {
                result = "Computer wins!";
            }

            if (result === "It's a tie!") {
                score.tie++;
            }

            else if (result === "Computer wins!") {
                score.losses++;
            }

            else {
                score.wins++;
            }

            localStorage.setItem('score', JSON.stringify(score));

            document.querySelector('.js-result').innerHTML = result;

            document.querySelector('.js-moves').innerHTML =
                `You chose ${PlayerMove} | Computer chose ${computerMove}`;

            updateScore();
        }

        function pickComputerMove() {

            const randomNumber = Math.random();

            if (randomNumber < 0.33) {
                return 'Stone';
            }

            else if (randomNumber < 0.66) {
                return 'Paper';
            }

            else {
                return 'Scissors';
            }
        }

        function updateScore() {

            document.querySelector('.js-score').innerHTML =
                `Wins: ${score.wins} | Losses: ${score.losses} | Ties: ${score.tie}`;
        }

    </script>

</body>

</html>
